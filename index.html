<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Pokemon World - Multijoueur</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; overflow: hidden; font-family: system-ui; width: 100%; height: 100%; touch-action: none; overscroll-behavior: none; -webkit-overflow-scrolling: none; }
  canvas { display: block; touch-action: none; width: 100% !important; height: 100% !important; }
  #info {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 13px; opacity: 0.5; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  #lobby {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); z-index: 100;
    backdrop-filter: blur(6px);
  }
  #lobby.hidden { display: none; }
  #lobby-box {
    background: rgba(16, 24, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 24px 28px;
    text-align: center; color: #fff; min-width: 280px; max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #lobby-box h2 { font-size: 20px; margin-bottom: 20px; font-weight: 500; color: #8BC4FF; }
  #auth-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: rgba(255,255,255,0.06); border-radius: 8px; padding: 3px;
  }
  .tab {
    flex: 1; padding: 8px; border: none; border-radius: 6px;
    font-size: 13px; cursor: pointer; font-family: inherit;
    background: transparent; color: rgba(255,255,255,0.5);
    transition: all 0.2s;
  }
  .tab.active { background: rgba(74,158,255,0.25); color: #fff; }
  .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }
  #lobby-box input {
    width: 100%; padding: 10px 14px; margin: 5px 0;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    font-size: 14px;
    background: rgba(255,255,255,0.06); color: #fff;
    font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  #lobby-box input::placeholder { color: rgba(255,255,255,0.25); }
  #lobby-box input:focus { border-color: #4A9EFF; }
  .action-btn {
    display: block; width: 100%; padding: 11px; margin: 12px 0 4px;
    border: none; border-radius: 8px; font-size: 15px;
    cursor: pointer; font-family: inherit;
    background: #4A9EFF; color: #fff;
    transition: transform 0.1s, background 0.2s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn:hover { background: #3A8EEF; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin-top: 8px; font-size: 13px; color: #F06878; min-height: 18px; }
  .solo-link { margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.3); cursor: pointer; }
  .solo-link:hover { color: rgba(255,255,255,0.55); }
  #connBadge {
    position: fixed; top: 10px; right: 10px; z-index: 50;
    padding: 8px 14px; border-radius: 10px; font-size: 12px;
    background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.6);
    backdrop-filter: blur(4px); display: none;
    text-align: center; cursor: default; max-width: 45vw;
  }
  #connBadge.on {
    display: block; background: rgba(50,180,80,0.25); color: #6FE080;
    border: 1px solid rgba(50,180,80,0.3);
  }
  .badge-name { font-size: 15px; font-weight: 600; color: #fff; display: block; margin-bottom: 2px; }
  .badge-info { font-size: 11px; opacity: 0.7; }
  .badge-logout {
    font-size: 10px; opacity: 0.5; cursor: pointer;
    margin-top: 4px; display: block;
  }
  .badge-logout:hover { opacity: 1; color: #F06878; }
  #sos-btn {
    position: fixed; top: 10px; left: 10px; z-index: 50;
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(16, 24, 42, 0.85);
    color: #FF8060; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.1s, background 0.2s;
  }
  #sos-btn:hover { background: rgba(240, 80, 60, 0.35); transform: scale(1.05); }
  #sos-btn:active { transform: scale(0.95); }
  #nametags {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  .nametag {
    position: absolute;
    transform: translate(-50%, -100%);
    color: #fff; font-size: 11px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    white-space: nowrap; pointer-events: none;
    font-family: system-ui; font-weight: 500;
  }
  @media (max-width: 768px) {
    #info { display: none !important; }
    #lobby-box { padding: 20px 20px; min-width: 0; width: 90vw; }
    #lobby-box h2 { font-size: 18px; margin-bottom: 14px; }
    #lobby-box input { padding: 9px 12px; font-size: 14px; }
    .action-btn { padding: 10px; font-size: 14px; }
    .badge-name { font-size: 13px; }
    .badge-info { font-size: 10px; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div id="lobby-box">
    <h2>Pokemon World</h2>
    <div id="auth-tabs">
      <button class="tab active" data-tab="login">Connexion</button>
      <button class="tab" data-tab="register">Inscription</button>
    </div>
    <div id="tab-login">
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Mot de passe">
      <button class="action-btn" id="btnLogin">Se connecter</button>
    </div>
    <div id="tab-register" style="display:none">
      <input id="regEmail" type="email" placeholder="Email">
      <input id="regName" type="text" placeholder="Nom de dresseur" maxlength="16">
      <input id="regPass" type="password" placeholder="Mot de passe (6+ caracteres)">
      <input id="regPass2" type="password" placeholder="Confirmer le mot de passe">
      <button class="action-btn" id="btnRegister">Creer un compte</button>
    </div>
    <div id="status"></div>
    <div class="solo-link" id="btnSolo">Jouer hors ligne</div>
  </div>
</div>

<div id="connBadge"></div>
<div id="nametags"></div>
<button id="sos-btn" title="Teleporter a Bourg-Aurore">&#x21A9;</button>
<div id="info" style="display:none">Fleches / WASD pour se deplacer | SHIFT: sprint | M: carte</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
